services:

  # ─────────────────────────────────────────────
  # Nginx — 統一 HTTP 入口
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${PMA_PORT:-8080}:8080"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../backend:/var/www/backend:ro
    depends_on:
      - php-fpm
      - phpmyadmin
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PHP-FPM — CodeIgniter 4 後端
  # ─────────────────────────────────────────────
  php-fpm:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    volumes:
      - ../backend:/var/www/backend
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory_db}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis 7 — Session / Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass $$REDIS_PASSWORD
        else
          redis-server
        fi
      '
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # phpMyAdmin — 資料庫管理介面（透過 nginx:8080）
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-app}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-secret}
      UPLOAD_LIMIT: 100M
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MinIO — 物件儲存（圖片、PDF）
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
