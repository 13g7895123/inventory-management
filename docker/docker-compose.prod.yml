services:

  # ─────────────────────────────────────────────
  # Nuxt — 前端（僅 production 環境）
  # ─────────────────────────────────────────────
  nuxt:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost/api/v1}
    restart: unless-stopped

  # production 時 nginx 額外依賴 nuxt
  nginx:
    depends_on:
      - nuxt
