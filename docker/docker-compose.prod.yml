services:

  # ─────────────────────────────────────────────
  # Nuxt 3 — Production 前端容器
  # ─────────────────────────────────────────────
  nuxt:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost/api/v1}
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Nginx — Production 覆蓋：加入 nuxt 依賴、移除 extra_hosts
  # ─────────────────────────────────────────────
  nginx:
    depends_on:
      - php-fpm
      - phpmyadmin
      - nuxt
    extra_hosts: []  # production 環境 nuxt 為容器，不需要 host-gateway

  # ─────────────────────────────────────────────
  # PHP-FPM — Production 環境設定
  # ─────────────────────────────────────────────
  php-fpm:
    environment:
      - CI_ENVIRONMENT=production
